name: Build条码输入法-Unsigned-IPA

on:
  workflow_dispatch:  # 手动触发构建（无需等待代码推送）

jobs:
  build:
    runs-on: macos-14  # 兼容 iOS 16.6 的 Xcode 15.4 环境
    steps:
      - name: 📦 拉取代码
        uses: actions/checkout@v4

      - name: 🔧 构建无签名IPA
        run: |
          xcodebuild clean \
            -scheme "条码输入法" \  # 替换为Xcode中实际Scheme名
            -destination 'generic/platform=iOS'
          
          xcodebuild archive \
            -scheme "条码输入法" \
            -destination 'generic/platform=iOS' \
            -archivePath "./build/BarcodeKeyboard.xcarchive" \
            CODE_SIGNING_REQUIRED=NO \          # 强制跳过签名
            CODE_SIGN_IDENTITY="" \             # 清空签名标识
            PROVISIONING_PROFILE_SPECIFIER=""   # 禁用描述文件验证
          
          xcodebuild -exportArchive \
            -archivePath "./build/BarcodeKeyboard.xcarchive" \
            -exportPath "./build" \
            -exportOptionsPlist "./exportOptions.plist"

      - name: 📤 上传IPA
        uses: actions/upload-artifact@v3
        with:
          name: 条码输入法-Unsigned-IPA
          path: ./build/*.ipa
