name: Build Unsigned IPA for TrollStore
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_note:
        description: 构建备注
        required: false
        default: 自动打包条码输入法

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: 拉取仓库全部代码
        uses: actions/checkout@v4

      - name: 编译归档（无签名）
        run: |
          xcodebuild archive \
            -project tiaoma2.xcodeproj \
            -scheme BarcodeKeyboard \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/BarcodeKeyboard.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: 导出无签名IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath ./build/BarcodeKeyboard.xcarchive \
            -exportPath ./build/ \
            -exportOptionsPlist ./exportOptions.plist

      - name: 上传IPA构建产物
        uses: actions/upload-artifact@v4
        with:
          name: 条码输入法_iOS16.6_TrollStore
          path: ./build/*.ipa